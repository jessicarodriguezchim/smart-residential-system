version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: fraccionamiento-app
    container_name: fraccionamiento-app-container
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - fracc-network

  web:
    image: nginx:alpine
    container_name: fraccionamiento-nginx-container
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - fracc-network

  db:
    image: mysql:8.0
    container_name: fraccionamiento-mysql-container
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: fraccionamiento
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "33066:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - fracc-network

  redis:
    image: redis:alpine
    container_name: fraccionamiento-redis-container
    restart: unless-stopped
    ports:
      - "63799:6379"
    networks:
      - fracc-network

networks:
  fracc-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
